.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

    #archipel-categories { color: var(--foreground); }

    #archipel-categories .brand { display: flex; align-items: center; gap: 10px; }

    #archipel-categories .brand-copy { display: grid; gap: 2px; }
    #archipel-categories .brand-name { font-weight: 500; }

    #archipel-categories .roadmap { display: grid; grid-template-columns: repeat(8, minmax(64px, 1fr)); gap: 8px; align-items: start; }

    #archipel-categories .mission-title { display: grid; gap: 5px; }
    #archipel-categories .mission-kicker { color: var(--muted-foreground); }
    #archipel-categories .mission-dots { display: flex; gap: 6px; align-items: center; }
    #archipel-categories .mission-dot { width: 10px; height: 10px; border-radius: 999px; background: var(--muted); border: 1px solid var(--border); }
    #archipel-categories .mission-dot.is-done { background: var(--viz-series-1); border-color: transparent; }
    #archipel-categories .mission-dot.is-current { background: var(--primary); border-color: var(--primary); }
    #archipel-categories .concept-strip { display: flex; align-items: flex-start; gap: 10px; padding-block: 4px; }
    #archipel-categories .concept-icon { font-size: 22px; flex: 0 0 auto; }
    #archipel-categories .concept-copy { display: grid; gap: 4px; }
    #archipel-categories .diagram { min-height: 180px; display: grid; place-items: center; padding: 8px; color: var(--foreground); }
    #archipel-categories .diagram svg { width: 100%; max-width: 560px; height: 180px; overflow: visible; }
    #archipel-categories .diagram .node { fill: color-mix(in srgb, var(--viz-series-1) 14%, var(--card)); stroke: var(--border); stroke-width: 1.5; }
    #archipel-categories .diagram .node-alt { fill: color-mix(in srgb, var(--viz-series-2) 14%, var(--card)); stroke: var(--border); stroke-width: 1.5; }
    #archipel-categories .diagram .edge { stroke: var(--foreground); stroke-width: 2; fill: none; }
    #archipel-categories .diagram .soft-edge { stroke: var(--muted-foreground); stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; }
    #archipel-categories .diagram text { fill: var(--foreground); font-family: inherit; font-size: 14px; }
    #archipel-categories .question-zone { display: grid; gap: 12px; }

    #archipel-categories .answers .btn { white-space: normal; text-align: left; justify-content: flex-start; }

      const freshState = () =&gt; ({ currentLevel: 0, currentQuestion: 0, unlocked: 1, completed: [], correct: {}, attempts: {}, seen: [] });

      function loadState() {

          if (!raw &amp;&amp; window.name.startsWith(`${STORAGE_KEY}:`)) raw = window.name.slice(STORAGE_KEY.length + 1);
          const saved = JSON.parse(raw);
          if (!saved || typeof saved !== &#x27;object&#x27;) return freshState();
          return Object.assign(freshState(), saved, {
            completed: Array.isArray(saved.completed) ? saved.completed : [],
            seen: Array.isArray(saved.seen) ? saved.seen : [],
            correct: saved.correct || {},
            attempts: saved.attempts || {}
          });
        } catch (_) { return freshState(); }
      }

      function saveState() {

          &lt;/div&gt;
          &lt;div class=&quot;concept-strip&quot;&gt;
            &lt;span class=&quot;concept-icon&quot; aria-hidden=&quot;true&quot;&gt;💡&lt;/span&gt;
            &lt;div class=&quot;concept-copy&quot;&gt;&lt;strong&gt;${level.concept}&lt;/strong&gt;&lt;span&gt;${level.intro}&lt;/span&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;diagram&quot;&gt;${diagrams[level.diagram]}&lt;/div&gt;
          &lt;div class=&quot;question-zone&quot;&gt;
            &lt;div class=&quot;question&quot;&gt;${item.q}&lt;/div&gt;
            &lt;div class=&quot;answers&quot;&gt;${item.a.map((answer, i) =&gt; `&lt;button type=&quot;button&quot; class=&quot;btn btn-block&quot; data-answer=&quot;${i}&quot; ${savedCorrect ? &#x27;disabled&#x27; : &#x27;&#x27;}&gt;${answer}&lt;/button&gt;`).join(&#x27;&#x27;)}&lt;/div&gt;
            &lt;div class=&quot;feedback ${savedCorrect ? &#x27;is-success&#x27; : &#x27;&#x27;}&quot; id=&quot;cat-feedback&quot;&gt;${savedCorrect ? `✓ ${item.why}` : &#x27;Choisis une réponse pour tester ton intuition.&#x27;}&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;action-row&quot;&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;cat-prev&quot; ${questionIndex === 0 ? &#x27;disabled&#x27; : &#x27;&#x27;}&gt;← Mission précédente&lt;/button&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;cat-next&quot; ${savedCorrect ? &#x27;&#x27; : &#x27;disabled&#x27;}&gt;${questionIndex === level.questions.length - 1 ? &#x27;Terminer l’île&#x27; : &#x27;Mission suivante&#x27;} →&lt;/button&gt;
          &lt;/div&gt;`;

        markSeen(levelIndex);
        saveState();
        play.querySelectorAll(&#x27;[data-answer]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; chooseAnswer(Number(button.dataset.answer))));
        play.querySelector(&#x27;#cat-prev&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
          if (state.currentQuestion &gt; 0) { state.currentQuestion -= 1; answered = false; saveState(); renderPlay(); }
        });
        play.querySelector(&#x27;#cat-next&#x27;).addEventListener(&#x27;click&#x27;, nextMission);
      }

      function chooseAnswer(choice) {
        if (answered) return;
        const level = levels[state.currentLevel];
        const item = level.questions[state.currentQuestion];
        const key = keyFor(state.currentLevel, state.currentQuestion);
        state.attempts[key] = (state.attempts[key] || 0) + 1;
        const feedback = root.querySelector(&#x27;#cat-feedback&#x27;);
        const live = root.querySelector(&#x27;#cat-live&#x27;);
        if (choice === item.ok) {
          state.correct[key] = true;
          answered = true;
          feedback.className = &#x27;feedback is-success&#x27;;
          feedback.textContent = `✓ ${item.why}`;
          live.textContent = &#x27;Bonne réponse. Un éclat de savoir gagné.&#x27;;
          root.querySelectorAll(&#x27;[data-answer]&#x27;).forEach((button, i) =&gt; {
            button.disabled = true;
            if (i === choice) button.classList.add(&#x27;is-selected&#x27;);
          });
          root.querySelector(&#x27;#cat-next&#x27;).disabled = false;
          saveState();
          renderStats();
        } else {
          feedback.className = &#x27;feedback is-error&#x27;;
          feedback.textContent = &#x27;Pas tout à fait. Observe les sources, les cibles et l’ordre de lecture, puis réessaie.&#x27;;
          live.textContent = &#x27;Réponse incorrecte. Tu peux réessayer.&#x27;;
          saveState();
        }
      }

      function nextMission() {
        const level = levels[state.currentLevel];
        if (!state.correct[keyFor(state.currentLevel, state.currentQuestion)]) return;
        if (state.currentQuestion &lt; level.questions.length - 1) {
          state.currentQuestion += 1;
          answered = false;
          saveState();
          renderAll();
          return;
        }
        if (!state.completed.includes(state.currentLevel)) state.completed.push(state.currentLevel);
        const finished = state.currentLevel;
        state.unlocked = Math.min(levels.length, Math.max(state.unlocked, finished + 2));
        if (finished === levels.length - 1) {
          state.currentLevel = levels.length;
          state.currentQuestion = 0;
        } else {
          state.currentLevel = finished + 1;
          state.currentQuestion = 0;
        }
        answered = false;
        saveState();
        renderAll();
        root.querySelector(&#x27;#cat-live&#x27;).textContent = finished === levels.length - 1 ? &#x27;Expédition terminée.&#x27; : &#x27;Nouvelle île débloquée.&#x27;;
      }

      function renderNotebook() {
        const area = root.querySelector(&#x27;#cat-discoveries&#x27;);
        const discoveries = levels.filter((_, index) =&gt; state.seen.includes(index));
        area.innerHTML = discoveries.length
          ? discoveries.map((level, index) =&gt; `&lt;span class=&quot;viz-badge&quot;&gt;${level.icon} ${level.concept}${state.completed.includes(levels.indexOf(level)) ? &#x27; · maîtrisé&#x27; : &#x27; · en cours&#x27;}&lt;/span&gt;`).join(&#x27;&#x27;)
          : &#x27;&lt;span class=&quot;text-muted&quot;&gt;Ton premier concept apparaîtra ici dès que tu accosteras.&lt;/span&gt;&#x27;;
      }

      const resetButton = root.querySelector(&#x27;#cat-reset&#x27;);
      const resetPanel = root.querySelector(&#x27;#cat-reset-panel&#x27;);

      function closeResetPanel(returnFocus = false) {
        resetPanel.hidden = true;
        resetButton.setAttribute(&#x27;aria-expanded&#x27;, &#x27;false&#x27;);
        if (returnFocus) resetButton.focus();
      }

      function openResetPanel() {
        const levelIndex = Math.min(state.currentLevel, levels.length - 1);
        root.querySelector(&#x27;#cat-reset-island-detail&#x27;).textContent = `Île actuelle (${levels[levelIndex].name}) : efface ses réponses et reprend à sa première mission.`;
        resetPanel.hidden = false;
        resetButton.setAttribute(&#x27;aria-expanded&#x27;, &#x27;true&#x27;);
        root.querySelector(&#x27;#cat-reset-island&#x27;).focus();
      }

      function restartCurrentIsland() {
        const levelIndex = Math.min(state.currentLevel, levels.length - 1);
        levels[levelIndex].questions.forEach((_, questionIndex) =&gt; {
          const key = keyFor(levelIndex, questionIndex);
          delete state.correct[key];
          delete state.attempts[key];
        });
        state.completed = state.completed.filter(index =&gt; index !== levelIndex);
        state.currentLevel = levelIndex;
        state.currentQuestion = 0;
        answered = false;
        markSeen(levelIndex);
        closeResetPanel();
        saveState();
        renderAll();
        root.querySelector(&#x27;#cat-live&#x27;).textContent = `${levels[levelIndex].name} recommencée depuis la première mission.`;
      }

      function restartEntireGame() {
        state = freshState();
        answered = false;
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
        try { window.name = &#x27;&#x27;; } catch (_) {}
        closeResetPanel();
        renderAll();
        root.querySelector(&#x27;#cat-live&#x27;).textContent = &#x27;Toute la progression a été effacée. Retour à la première île.&#x27;;
      }

      resetButton.addEventListener(&#x27;click&#x27;, () =&gt; {
        if (resetPanel.hidden) openResetPanel();
        else closeResetPanel(true);
      });
      root.querySelector(&#x27;#cat-reset-island&#x27;).addEventListener(&#x27;click&#x27;, restartCurrentIsland);
      root.querySelector(&#x27;#cat-reset-game&#x27;).addEventListener(&#x27;click&#x27;, restartEntireGame);
      root.querySelector(&#x27;#cat-reset-cancel&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; closeResetPanel(true));
      root.addEventListener(&#x27;keydown&#x27;, event =&gt; {
        if (event.key === &#x27;Escape&#x27; &amp;&amp; !resetPanel.hidden) closeResetPanel(true);
      });

      renderAll();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
