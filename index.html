}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

      const levels = [
        {
          icon: &#x27;◇&#x27;, short: &#x27;Objets&#x27;, name: &#x27;La Plage des Objets&#x27;, concept: &#x27;Objets et morphismes&#x27;, diagram: &#x27;basic&#x27;,
          intro: &#x27;Une catégorie rassemble des objets et des flèches typées entre eux.&#x27;,
          course: [
            { title: &#x27;Objets, sources et buts&#x27;, body: &#x27;Une catégorie est un univers dans lequel on choisit des objets. Une flèche, aussi appelée morphisme, relie deux objets précis.&#x27;, points: [&#x27;La notation \\(f\\colon A\\to B\\) se lit « f va de A vers B ».&#x27;, &#x27;A est la source — ou domaine — de f.&#x27;, &#x27;B est le but — ou codomaine — de f.&#x27;], example: &#x27;Dans un réseau de villes, les villes jouent le rôle des objets et un trajet orienté celui d’un morphisme.&#x27; },
            { title: &#x27;Le type d’une flèche&#x27;, body: &#x27;Le couple source-but fait partie du type de la flèche. Deux flèches qui portent le même nom mais n’ont pas le même type ne sont pas interchangeables.&#x27;, points: [&#x27;On ne peut comparer deux morphismes que s’ils ont même source et même but.&#x27;, &#x27;\\(\\operatorname{Hom}_{\\mathcal C}(A,B)\\) désignera plus tard la collection de toutes les flèches \\(A\\to B\\) dans \\(\\mathcal C\\).&#x27;], example: &#x27;Une recette \\(\\text{Ingrédients}\\to\\text{Gâteau}\\) et une livraison \\(\\text{Entrepôt}\\to\\text{Maison}\\) décrivent deux transformations de types différents.&#x27; },
            { title: &#x27;Premières catégories concrètes&#x27;, body: &#x27;Une catégorie concrète possède des objets mathématiques familiers et des applications qui respectent leur structure.&#x27;, points: [&#x27;Ens : ensembles et fonctions.&#x27;, &#x27;Ab : groupes abéliens et homomorphismes de groupes.&#x27;, &#x27;Top : espaces topologiques et applications continues.&#x27;], example: &#x27;Dans Ens, une fonction f : X → Y est un morphisme. Dans Top, la même fonction n’est un morphisme que si elle est continue.&#x27; },
            { title: &#x27;Ce qu’il faut pour former une catégorie&#x27;, body: &#x27;Les objets et morphismes ne suffisent pas encore : il faudra aussi savoir composer les flèches et disposer d’une identité sur chaque objet.&#x27;, points: [&#x27;Chaque morphisme possède une source et un but uniques.&#x27;, &#x27;La structure doit rester cohérente quand on enchaîne des morphismes.&#x27;], example: &#x27;Les ensembles, fonctions, fonctions identité et composition habituelle forment bien la catégorie Ens.&#x27; }
          ]
        },
        {
          icon: &#x27;⇉&#x27;, short: &#x27;Composer&#x27;, name: &#x27;Le Détroit de la Composition&#x27;, concept: &#x27;Composition&#x27;, diagram: &#x27;chain&#x27;,
          intro: &#x27;La composition transforme deux étapes compatibles en une seule flèche.&#x27;,
          course: [
            { title: &#x27;Quand deux flèches s’emboîtent&#x27;, body: &#x27;Si \\(f\\colon A\\to B\\) et \\(g\\colon B\\to C\\), la sortie de f correspond exactement à l’entrée de g. On peut alors les composer.&#x27;, points: [&#x27;La composée se note \\(g\\circ f\\colon A\\to C\\).&#x27;, &#x27;On lit « g après f » : f est exécutée en premier.&#x27;, &#x27;Si les objets intermédiaires ne coïncident pas, la composition n’est pas définie.&#x27;], example: &#x27;Enfiler des chaussettes puis des chaussures se note \\(\\text{chaussures}\\circ\\text{chaussettes}\\).&#x27;},
            { title: &#x27;Composer dans Ens&#x27;, body: &#x27;Dans Ens, la composition est la composition ordinaire des fonctions.&#x27;, points: [&#x27;\\((g\\circ f)(x)=g(f(x))\\).&#x27;, &#x27;Le codomaine de f doit être le domaine de g.&#x27;, &#x27;La fonction composée conserve le type \\(A\\to C\\).&#x27;], example: &#x27;Si f double un entier et g ajoute 3, alors \\((g\\circ f)(4)=11\\).&#x27; },
            { title: &#x27;Composer dans Ab et Top&#x27;, body: &#x27;La composée de deux homomorphismes est encore un homomorphisme ; la composée de deux applications continues est encore continue.&#x27;, points: [&#x27;Cette stabilité est indispensable pour former une catégorie.&#x27;, &#x27;La composition dépend généralement de l’ordre : g ∘ f et f ∘ g peuvent différer ou ne pas être tous deux définis.&#x27;], example: &#x27;Dans Top, un chemin continu X → Y suivi d’une application continue Y → Z donne une application continue X → Z.&#x27; },
            { title: &#x27;Lire et vérifier un calcul&#x27;, body: &#x27;Pour contrôler une expression composée, on part de la droite et on suit les types.&#x27;, points: [&#x27;La source finale est celle de la flèche la plus à droite.&#x27;, &#x27;Le but final est celui de la flèche la plus à gauche.&#x27;, &#x27;Chaque objet rencontré au milieu doit se raccorder au suivant.&#x27;], example: &#x27;Avec A →ᶠ B →ᵍ C →ʰ D, l’expression h ∘ g ∘ f a le type A → D.&#x27; }
          ]
        },
        {
          icon: &#x27;⟲&#x27;, short: &#x27;Identités&#x27;, name: &#x27;L’Atoll des Identités&#x27;, concept: &#x27;Morphismes identité&#x27;, diagram: &#x27;identity&#x27;,
          intro: &#x27;Chaque objet possède une flèche neutre qui ne le modifie pas.&#x27;,
          course: [
            { title: &#x27;La flèche qui ne change rien&#x27;, body: &#x27;Pour chaque objet A, il existe un morphisme identité idₐ : A → A.&#x27;, points: [&#x27;Sa source et son but sont tous deux A.&#x27;, &#x27;Elle agit comme une étape neutre dans tout trajet.&#x27;, &#x27;Il existe une identité propre à chaque objet.&#x27;], example: &#x27;Dans Ens, idₓ est la fonction x ↦ x sur l’ensemble X.&#x27; },
            { title: &#x27;Les lois d’unité&#x27;, body: &#x27;Une identité peut être ajoutée avant ou après une flèche sans modifier celle-ci.&#x27;, points: [&#x27;Pour \\(f\\colon A\\to B\\), \\(f\\circ\\mathrm{id}_A=f\\).&#x27;, &#x27;Pour \\(f\\colon A\\to B\\), \\(\\mathrm{id}_B\\circ f=f\\).&#x27;, &#x27;Les indices sont imposés par les types.&#x27;], example: &#x27;Ne rien modifier à l’entrée, effectuer f, puis ne rien modifier à la sortie donne toujours f.&#x27; },
            { title: &#x27;Identités concrètes&#x27;, body: &#x27;Dans chaque catégorie concrète, l’identité est l’application identité sur l’objet sous-jacent.&#x27;, points: [&#x27;Dans Ab, elle préserve l’addition.&#x27;, &#x27;Dans Top, elle est toujours continue.&#x27;, &#x27;Une identité est unique dès que les lois d’unité sont satisfaites.&#x27;], example: &#x27;Sur ℤ, l’homomorphisme identité envoie tout entier n sur n.&#x27; },
            { title: &#x27;Pourquoi les identités comptent&#x27;, body: &#x27;Les identités permettent de traiter un objet comme un trajet de longueur nulle et rendent les calculs de composition uniformes.&#x27;, points: [&#x27;Elles font partie des axiomes d’une catégorie.&#x27;, &#x27;Un foncteur devra plus tard les préserver.&#x27;], example: &#x27;Dans une catégorie réduite à un seul objet, l’identité est l’élément neutre de la loi de composition.&#x27; }
          ]
        },
        {
          icon: &#x27;⋈&#x27;, short: &#x27;Associer&#x27;, name: &#x27;La Chaîne Associative&#x27;, concept: &#x27;Associativité&#x27;, diagram: &#x27;assoc&#x27;,
          intro: &#x27;Les parenthèses changent l’ordre du calcul, jamais le morphisme obtenu.&#x27;,
          course: [
            { title: &#x27;La loi associative&#x27;, body: &#x27;Avec \\(f\\colon A\\to B\\), \\(g\\colon B\\to C\\) et \\(h\\colon C\\to D\\), les deux façons de regrouper la composition donnent la même flèche \\(A\\to D\\).&#x27;, points: [&#x27;\\(h\\circ(g\\circ f)=(h\\circ g)\\circ f\\).&#x27;, &#x27;On peut donc écrire \\(h\\circ g\\circ f\\) sans parenthèses.&#x27;, &#x27;L’ordre des flèches, lui, ne change pas.&#x27;], example: &#x27;Pour des fonctions, les deux membres appliquent successivement f, puis g, puis h.&#x27; },
            { title: &#x27;Associer n’est pas commuter&#x27;, body: &#x27;L’associativité déplace des parenthèses. La commutativité échangerait l’ordre des opérations : ce sont deux propriétés différentes.&#x27;, points: [&#x27;On ne conclut jamais g ∘ f = f ∘ g.&#x27;, &#x27;Souvent, une seule des deux expressions est même bien typée.&#x27;], example: &#x27;Ajouter 1 puis doubler ne donne pas le même résultat que doubler puis ajouter 1.&#x27; },
            { title: &#x27;Chemins et calculs&#x27;, body: &#x27;Dans une longue chaîne, l’associativité autorise un calcul local sans ambiguïté sur le résultat global.&#x27;, points: [&#x27;On peut simplifier une sous-chaîne puis reprendre le trajet.&#x27;, &#x27;Toutes les parenthésisations compatibles sont égales.&#x27;], example: &#x27;Un compilateur peut regrouper plusieurs transformations de données sans changer leur ordre.&#x27; },
            { title: &#x27;Une catégorie à un objet&#x27;, body: &#x27;Une catégorie possédant un seul objet correspond à un monoïde : ses morphismes sont les éléments, la composition est la loi et l’identité est l’élément neutre.&#x27;, points: [&#x27;La loi du monoïde est associative.&#x27;, &#x27;Cette idée montre que les catégories généralisent des structures algébriques.&#x27;], example: &#x27;Les entiers naturels avec l’addition forment un monoïde, donc une catégorie à un objet.&#x27; }
          ]
        },
        {
          icon: &#x27;△&#x27;, short: &#x27;Diagrammes&#x27;, name: &#x27;Le Triangle Commutatif&#x27;, concept: &#x27;Diagrammes commutatifs&#x27;, diagram: &#x27;triangle&#x27;,
          intro: &#x27;Un diagramme commute lorsque ses chemins parallèles produisent la même flèche.&#x27;,
          course: [
            { title: &#x27;Dessiner une situation&#x27;, body: &#x27;Un diagramme place les objets comme des nœuds et les morphismes comme des flèches orientées.&#x27;, points: [&#x27;Un chemin représente une composition.&#x27;, &#x27;Deux chemins sont comparables s’ils ont même départ et même arrivée.&#x27;, &#x27;Le dessin aide à contrôler les types.&#x27;], example: &#x27;Dans un triangle A → B → C avec une flèche directe A → C, deux routes relient A à C.&#x27; },
            { title: &#x27;Commuter&#x27;, body: &#x27;Le diagramme commute si tous les chemins ayant mêmes extrémités donnent le même morphisme composé.&#x27;, points: [&#x27;Dans le triangle, \\(h=g\\circ f\\).&#x27;, &#x27;Dans un carré, droite puis bas égale bas puis droite.&#x27;, &#x27;La longueur graphique des chemins ne joue aucun rôle.&#x27;], example: &#x27;Une conversion directe et une conversion en deux étapes sont cohérentes si elles produisent exactement le même résultat.&#x27; },
            { title: &#x27;Vérifier dans Ens&#x27;, body: &#x27;Pour montrer qu’un diagramme de fonctions commute, on peut partir d’un élément arbitraire et comparer ses images le long des deux chemins.&#x27;, points: [&#x27;L’égalité doit valoir pour tout élément de la source.&#x27;, &#x27;Cette méthode est propre aux catégories concrètes où l’on peut parler d’éléments.&#x27;], example: &#x27;Pour prouver h = g ∘ f, on vérifie h(x) = g(f(x)) pour tout x.&#x27; },
            { title: &#x27;Le langage des propriétés&#x27;, body: &#x27;Les diagrammes expriment de nombreuses lois sans accumuler les formules.&#x27;, points: [&#x27;Les lois d’identité sont des diagrammes commutatifs.&#x27;, &#x27;La naturalité sera exprimée par un carré commutatif.&#x27;, &#x27;Les propriétés universelles comparent elles aussi des chemins.&#x27;], example: &#x27;Un même carré pourra résumer la cohérence de toute une famille de transformations.&#x27; }
          ]
        },
        {
          icon: &#x27;⟿&#x27;, short: &#x27;Foncteurs&#x27;, name: &#x27;Le Ferry des Foncteurs&#x27;, concept: &#x27;Foncteurs&#x27;, diagram: &#x27;functor&#x27;,
          intro: &#x27;Un foncteur transporte une catégorie vers une autre sans briser sa structure.&#x27;,
          course: [
            { title: &#x27;Transporter objets et flèches&#x27;, body: &#x27;Un foncteur F : 𝒞 → 𝒟 associe à chaque objet A de 𝒞 un objet F(A) de 𝒟, et à chaque morphisme f : A → B un morphisme F(f) : F(A) → F(B).&#x27;, points: [&#x27;La direction des flèches est conservée.&#x27;, &#x27;Sources et buts sont transportés avec leurs morphismes.&#x27;, &#x27;Le foncteur agit sur toute la catégorie.&#x27;], example: &#x27;Le foncteur d’oubli U : Ab → Ens garde l’ensemble sous-jacent et oublie l’addition.&#x27; },
            { title: &#x27;Préserver les identités&#x27;, body: &#x27;Un foncteur doit envoyer chaque identité sur l’identité correspondante.&#x27;, points: [&#x27;\\(F(\\mathrm{id}_A)=\\mathrm{id}_{F(A)}\\).&#x27;, &#x27;Une flèche neutre reste donc neutre après transport.&#x27;], example: &#x27;Sous le foncteur d’oubli, l’identité d’un groupe abélien devient la même fonction identité sur son ensemble.&#x27; },
            { title: &#x27;Préserver la composition&#x27;, body: &#x27;Le transport d’un chemin composé est le chemin composé des transports.&#x27;, points: [&#x27;\\(F(g\\circ f)=F(g)\\circ F(f)\\).&#x27;, &#x27;Un diagramme commutatif reste commutatif après application de F.&#x27;], example: &#x27;Oublier la structure après avoir composé deux homomorphismes revient à composer les fonctions sous-jacentes.&#x27; },
            { title: &#x27;Exemples et nuances&#x27;, body: &#x27;Il existe des foncteurs d’inclusion, d’oubli, constants ou construits à partir d’objets.&#x27;, points: [&#x27;Un foncteur constant envoie tous les objets sur un même objet et toutes les flèches sur son identité.&#x27;, &#x27;Un foncteur fidèle ne confond pas deux morphismes distincts.&#x27;, &#x27;Un foncteur plein atteint tous les morphismes entre les objets de son image.&#x27;], example: &#x27;L’inclusion des espaces topologiques discrets dans Top est un foncteur.&#x27; }
          ]
        },
        {
          icon: &#x27;⧉&#x27;, short: &#x27;Naturelles&#x27;, name: &#x27;Le Pont des Transformations&#x27;, concept: &#x27;Transformations naturelles&#x27;, diagram: &#x27;natural&#x27;,
          intro: &#x27;Une transformation naturelle compare deux foncteurs de façon uniforme.&#x27;,
          course: [
            { title: &#x27;Une flèche pour chaque objet&#x27;, body: &#x27;Pour deux foncteurs F,G : 𝒞 → 𝒟, une transformation naturelle η : F ⇒ G fournit pour chaque objet A une composante ηₐ : F(A) → G(A).&#x27;, points: [&#x27;Toutes les composantes vivent dans 𝒟.&#x27;, &#x27;Elles ont un sens commun : passer de la construction F à la construction G.&#x27;], example: &#x27;Une famille d’applications ηₓ peut comparer deux façons de transformer chaque ensemble X.&#x27; },
            { title: &#x27;Le carré de naturalité&#x27;, body: &#x27;Les composantes doivent être compatibles avec chaque morphisme \\(f\\colon A\\to B\\) de \\(\\mathcal C\\).&#x27;, points: [&#x27;\\(G(f)\\circ\\eta_A=\\eta_B\\circ F(f)\\).&#x27;, &#x27;Descendre puis avancer donne le même résultat qu’avancer puis descendre.&#x27;, &#x27;Cette égalité doit valoir pour toutes les flèches f.&#x27;], example: &#x27;Le carré reliant \\(F(A)\\), \\(F(B)\\), \\(G(A)\\) et \\(G(B)\\) doit commuter.&#x27; },
            { title: &#x27;Exemples&#x27;, body: &#x27;L’identité de chaque F(A) forme une transformation naturelle id_F : F ⇒ F.&#x27;, points: [&#x27;Les composantes peuvent être composées verticalement.&#x27;, &#x27;Si toutes les composantes sont des isomorphismes, η est un isomorphisme naturel.&#x27;, &#x27;Une simple famille de flèches n’est pas forcément naturelle.&#x27;], example: &#x27;L’application canonique d’un espace vectoriel vers son bidual est naturelle ; choisir arbitrairement une base ne l’est pas.&#x27; },
            { title: &#x27;La catégorie des foncteurs&#x27;, body: &#x27;Pour 𝒞 et 𝒟 fixées, on peut former une catégorie dont les objets sont les foncteurs 𝒞 → 𝒟 et les morphismes sont les transformations naturelles.&#x27;, points: [&#x27;L’identité est la transformation identité.&#x27;, &#x27;La composition est effectuée composante par composante.&#x27;], example: &#x27;Les transformations naturelles sont donc elles-mêmes des morphismes à un niveau supérieur.&#x27; }
          ]
        },
        {
          icon: &#x27;⊣&#x27;, short: &#x27;Adjonctions&#x27;, name: &#x27;Le Maelström des Adjonctions&#x27;, concept: &#x27;Adjonctions&#x27;, diagram: &#x27;adjunction&#x27;,
          intro: &#x27;Une adjonction exprime une correspondance naturelle entre deux façons de décrire un morphisme.&#x27;,
          course: [
            { title: &#x27;Comprendre Hom&#x27;, body: &#x27;Pour des objets A et B d’une catégorie \\(\\mathcal C\\), \\(\\operatorname{Hom}_{\\mathcal C}(A,B)\\) est la collection de tous les morphismes de A vers B.&#x27;, points: [&#x27;Dans Ens, \\(\\operatorname{Hom}_{\\mathbf{Ens}}(X,Y)\\) est l’ensemble des fonctions \\(X\\to Y\\).&#x27;, &#x27;Dans Ab, \\(\\operatorname{Hom}_{\\mathbf{Ab}}(A,B)\\) est l’ensemble des homomorphismes \\(A\\to B\\).&#x27;, &#x27;L’indice indique dans quelle catégorie les morphismes sont pris.&#x27;], example: &#x27;Si X possède 2 éléments et Y en possède 3, \\(\\operatorname{Hom}_{\\mathbf{Ens}}(X,Y)\\) contient \\(3^2=9\\) fonctions.&#x27; },
            { title: &#x27;La bijection d’adjonction&#x27;, body: &#x27;Pour \\(F\\colon\\mathcal C\\to\\mathcal D\\) et \\(G\\colon\\mathcal D\\to\\mathcal C\\), écrire \\(F\\dashv G\\) signifie qu’il existe des bijections naturelles&#x27;, points: [&#x27;\\(\\operatorname{Hom}_{\\mathcal D}(F(A),B)\\cong\\operatorname{Hom}_{\\mathcal C}(A,G(B))\\).&#x27;, &#x27;F est l’adjoint à gauche et G l’adjoint à droite.&#x27;, &#x27;La correspondance doit être naturelle en A et en B, pas seulement exister au cas par cas.&#x27;], example: &#x27;Donner une flèche \\(F(A)\\to B\\) revient exactement à donner une flèche \\(A\\to G(B)\\).&#x27; },
            { title: &#x27;Libre et oubli&#x27;, body: &#x27;Le foncteur groupe abélien libre ℤ[-] : Ens → Ab est adjoint à gauche du foncteur d’oubli U : Ab → Ens.&#x27;, points: [&#x27;\\(\\operatorname{Hom}_{\\mathbf{Ab}}(\\mathbb Z[X],A)\\cong\\operatorname{Hom}_{\\mathbf{Ens}}(X,U(A))\\).&#x27;, &#x27;Une fonction choisissant dans A l’image de chaque générateur s’étend en un unique homomorphisme.&#x27;, &#x27;L’adjoint gauche construit librement ; l’adjoint droit oublie ou contraint souvent.&#x27;], example: &#x27;Une fonction X → U(A) détermine entièrement l’homomorphisme ℤ[X] → A.&#x27; },
            { title: &#x27;Unité, counité et autres exemples&#x27;, body: &#x27;Une adjonction possède une unité η : id𝒞 ⇒ G∘F et une counité ε : F∘G ⇒ id𝒟, reliées par les identités triangulaires.&#x27;, points: [&#x27;Une adjonction n’est pas forcément une équivalence.&#x27;, &#x27;Dans Top, le foncteur espace discret est adjoint à gauche du foncteur d’oubli Top → Ens.&#x27;, &#x27;Si les produits existent, le foncteur diagonal Δ est adjoint à gauche du foncteur produit.&#x27;], example: &#x27;L’unité en X envoie chaque élément de X vers le générateur correspondant du groupe libre ℤ[X].&#x27; }
          ]
        }
      ];

      const Q = (id, difficulty, q, correct, wrong, why) =&gt; ({ id, difficulty, q, correct, wrong, why });

      function hashSeed(value) {
        let h = 2166136261;
        for (const char of String(value)) { h ^= char.charCodeAt(0); h = Math.imul(h, 16777619); }
        return h &gt;&gt;&gt; 0;
      }

      function seededRandom(value) {
        let seed = hashSeed(value);
        return () =&gt; {
          seed += 0x6D2B79F5;
          let t = seed;
          t = Math.imul(t ^ (t &gt;&gt;&gt; 15), t | 1);
          t ^= t + Math.imul(t ^ (t &gt;&gt;&gt; 7), t | 61);
          return ((t ^ (t &gt;&gt;&gt; 14)) &gt;&gt;&gt; 0) / 4294967296;
        };
      }

      function shuffled(values, rng) {
        const copy = [...values];
        for (let i = copy.length - 1; i &gt; 0; i -= 1) {
          const j = Math.floor(rng() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function toTex(value) {
        return String(value)
          .replace(/id𝒞/g, &#x27;\\mathrm{id}_{\\mathcal C}&#x27;)
          .replace(/id𝒟/g, &#x27;\\mathrm{id}_{\\mathcal D}&#x27;)
          .replace(/idₐ/g, &#x27;\\mathrm{id}_{A}&#x27;)
          .replace(/idᵦ/g, &#x27;\\mathrm{id}_{B}&#x27;)
          .replace(/idₓ/g, &#x27;\\mathrm{id}_{X}&#x27;)
          .replace(/id_([FG])\(([^)]+)\)/g, &#x27;\\mathrm{id}_{$1($2)}&#x27;)
          .replace(/id_([A-Z])/g, &#x27;\\mathrm{id}_{$1}&#x27;)
          .replace(/id_F/g, &#x27;\\mathrm{id}_F&#x27;)
          .replace(/id_G/g, &#x27;\\mathrm{id}_G&#x27;)
          .replace(/Hom_/g, &#x27;\\operatorname{Hom}_&#x27;)
          .replace(/(?&lt;!\\operatorname\{)\bHom\b/g, &#x27;\\operatorname{Hom}&#x27;)
          .replace(/(?&lt;!\\mathrm\{)\bid\b/g, &#x27;\\mathrm{id}&#x27;)
          .replace(/Ens/g, &#x27;\\mathbf{Ens}&#x27;)
          .replace(/Ab/g, &#x27;\\mathbf{Ab}&#x27;)
          .replace(/Top/g, &#x27;\\mathbf{Top}&#x27;)
          .replace(/𝒞/g, &#x27;\\mathcal C&#x27;)
          .replace(/𝒟/g, &#x27;\\mathcal D&#x27;)
          .replace(/ℤ/g, &#x27;\\mathbb Z&#x27;)
          .replace(/ℕ/g, &#x27;\\mathbb N&#x27;)
          .replace(/∅/g, &#x27;\\varnothing&#x27;)
          .replace(/ηₐ/g, &#x27;\\eta_A&#x27;)
          .replace(/ηᵦ/g, &#x27;\\eta_B&#x27;)
          .replace(/θₐ/g, &#x27;\\theta_A&#x27;)
          .replace(/α/g, &#x27;\\alpha&#x27;)
          .replace(/β/g, &#x27;\\beta&#x27;)
          .replace(/γ/g, &#x27;\\gamma&#x27;)
          .replace(/δ/g, &#x27;\\delta&#x27;)
          .replace(/ε/g, &#x27;\\varepsilon&#x27;)
          .replace(/η/g, &#x27;\\eta&#x27;)
          .replace(/θ/g, &#x27;\\theta&#x27;)
          .replace(/→/g, &#x27;\\to &#x27;)
          .replace(/←/g, &#x27;\\leftarrow &#x27;)
          .replace(/⇒/g, &#x27;\\Rightarrow &#x27;)
          .replace(/⊣/g, &#x27;\\dashv &#x27;)
          .replace(/≅/g, &#x27;\\cong &#x27;)
          .replace(/∘/g, &#x27;\\circ &#x27;)
          .replace(/∈/g, &#x27;\\in &#x27;)
          .replace(/×/g, &#x27;\\times &#x27;)
          .replace(/↦/g, &#x27;\\mapsto &#x27;)
          .replace(/²/g, &#x27;^2&#x27;)
          .replace(/\s*:\s*/g, &#x27;\\colon &#x27;)
          .replace(/\s+/g, &#x27; &#x27;)
          .trim();
      }

      function mathText(value) {
        const stored = [];
        const hold = math =&gt; `,¤${stored.push(math) - 1},`;
        const escapeAttribute = text =&gt; String(text)
          .replace(/&amp;/g, &#x27;&amp;amp;&#x27;)
          .replace(/&quot;/g, &#x27;&amp;quot;&#x27;)
          .replace(/&lt;/g, &#x27;&amp;lt;&#x27;)
          .replace(/&gt;/g, &#x27;&amp;gt;&#x27;);
        const texFallback = tex =&gt; String(tex)
          .replace(/\\operatorname\{Hom\}/g, &#x27;Hom&#x27;)
          .replace(/\\mathrm\{id\}/g, &#x27;id&#x27;)
          .replace(/\\mathcal\s*C/g, &#x27;𝒞&#x27;)
          .replace(/\\mathcal\s*D/g, &#x27;𝒟&#x27;)
          .replace(/\\mathbf\{(Ens|Ab|Top)\}/g, &#x27;$1&#x27;)
          .replace(/\\mathbb\s*Z/g, &#x27;ℤ&#x27;)
          .replace(/\\mathbb\s*N/g, &#x27;ℕ&#x27;)
          .replace(/\\varnothing/g, &#x27;∅&#x27;)
          .replace(/\\varepsilon/g, &#x27;ε&#x27;)
          .replace(/\\(alpha|beta|gamma|delta|eta|theta)/g, (_, name) =&gt; ({ alpha: &#x27;α&#x27;, beta: &#x27;β&#x27;, gamma: &#x27;γ&#x27;, delta: &#x27;δ&#x27;, eta: &#x27;η&#x27;, theta: &#x27;θ&#x27; }[name]))
          .replace(/\\colon/g, &#x27;:&#x27;)
          .replace(/\\to/g, &#x27;→&#x27;)
          .replace(/\\leftarrow/g, &#x27;←&#x27;)
          .replace(/\\Rightarrow/g, &#x27;⇒&#x27;)
          .replace(/\\dashv/g, &#x27;⊣&#x27;)
          .replace(/\\cong/g, &#x27;≅&#x27;)
          .replace(/\\circ/g, &#x27;∘&#x27;)
          .replace(/\\in/g, &#x27;∈&#x27;)
          .replace(/\\times/g, &#x27;×&#x27;)
          .replace(/\\mapsto/g, &#x27;↦&#x27;)
          .replace(/\\text\{([^}]*)\}/g, &#x27;$1&#x27;)
          .replace(/[{}]/g, &#x27;&#x27;)
          .replace(/\s+/g, &#x27; &#x27;)
          .trim();
        const mathSpan = (tex, fallback = texFallback(tex)) =&gt; `&lt;span class=&quot;math-inline&quot; data-math-tex=&quot;${escapeAttribute(tex)}&quot; data-math-fallback=&quot;${escapeAttribute(fallback)}&quot; aria-label=&quot;${escapeAttribute(fallback)}&quot;&gt;&lt;span class=&quot;math-fallback&quot;&gt;${escapeAttribute(fallback)}&lt;/span&gt;&lt;/span&gt;`;
        const wrapTex = (tex, fallback) =&gt; hold(mathSpan(tex, fallback));
        const wrap = expression =&gt; wrapTex(toTex(expression), expression);
        let text = String(value).replace(/\\\(([\s\S]*?)\\\)/g, (_, tex) =&gt; wrapTex(tex));
        text = text.replace(/Hom(𝒞|𝒟|Ens|Ab|Top)\(([^)]+)\)/g, (_, category, args) =&gt; wrap(`Hom_${category}(${args})`));
        text = text.replace(/([A-Z𝒞𝒟]+\s*(?:→|←)\s*[A-Z𝒞𝒟]+\s*:\s*[A-Za-zΑ-ω]+)/gu, wrap);
        text = text.replace(/([A-Za-zΑ-ωℤΔ]+(?:\[[^\]]+\])?)\s*:\s*(Ens|Ab|Top|𝒞|𝒟|[A-Z]|F\([A-Z]\)|G\([A-Z]\))\s*→\s*(Ens|Ab|Top|𝒞|𝒟|[A-Z]|F\([A-Z]\)|G\([A-Z]\))/g, wrap);
        text = text.replace(/((?:[^\s,.;:«»]+\s*:\s*)?[^\s,.;:«»]+(?:\s*(?:→|←|⇒)\s*[^\s,.;:«»]+)+)/g, wrap);
        text = text.replace(/([^\s,.;:«»]+(?:\s*(?:∘|=|≅|⊣|∈|↦|×)\s*[^\s,.;:«»]+)+)/g, wrap);
        text = text.replace(/id(?:𝒞|𝒟|[ₐᵦₓ]|_[A-Z]|_[FG](?:\([^)]+\))?)/g, wrap);
        text = text.replace(/\b([FGU])\(([A-DXYZ])\)/g, wrap);
        text = text.replace(/(?&lt;![\p{L}\p{N}_])(id(?:[ₐᵦₓ])?|Hom|𝒞|𝒟|ℤ|ℕ|[ηθ](?:[ₐᵦ])?|[αβγδε])(?![\p{L}\p{N}_])/gu, match =&gt; wrap(match));
        text = text.replace(/\b(Ens|Ab|Top)\b/g, match =&gt; wrap(match));
        text = text.replace(/(?&lt;![\p{L}\p{N}_&#x27;’])([A-Z]|e|f|g|h|k|n|p|q|r|s|u|v|w|x)(?![\p{L}\p{N}_&#x27;’])/gu, match =&gt; wrap(match));
        return text.replace(/,¤(\d+),/g, (_, index) =&gt; stored[Number(index)]);
      }

      function feedbackMarkup(message, tone = &#x27;hint&#x27;) {
        const icon = tone === &#x27;success&#x27; ? &#x27;✓&#x27; : tone === &#x27;error&#x27; ? &#x27;!&#x27; : &#x27;&#x27;;

        const distractors = item.wrong.slice(0, answerCount - 1);
        const answers = shuffled([item.correct, ...distractors], rng);
        return { id: item.id, difficulty: item.difficulty, q: item.q, answers, ok: answers.indexOf(item.correct), why: item.why };
      }

      const freshState = () =&gt; ({
        schemaVersion: 5,
        gameSeed: `${Date.now()}-${Math.random()}`,
        currentLevel: 0,
        currentQuestion: 0,
        unlocked: 1,
        completed: [],
        correct: {},
        attempts: {},
        seen: [],
        positions: {},
        runs: {},
        runCounts: {},
        courseCompleted: [],
        viewMode: &#x27;course&#x27;,
        coursePage: 0,
        returnToQuiz: false,
        questionStats: {},
        mistakes: 0,
        bestScores: {},
        timerStart: null
      });
      const freshSaveBank = () =&gt; ({ version: 4, slots: Array(SLOT_COUNT).fill(null) });

      function normalizeState(saved) {
        if (!saved || typeof saved !== &#x27;object&#x27; || saved.schemaVersion !== 5) return freshState();
        const normalized = Object.assign(freshState(), saved, {
          completed: Array.isArray(saved.completed) ? saved.completed : [],
          seen: Array.isArray(saved.seen) ? saved.seen : [],
          courseCompleted: Array.isArray(saved.courseCompleted) ? saved.courseCompleted : [],
          correct: saved.correct &amp;&amp; typeof saved.correct === &#x27;object&#x27; ? saved.correct : {},
          attempts: saved.attempts &amp;&amp; typeof saved.attempts === &#x27;object&#x27; ? saved.attempts : {},
          positions: saved.positions &amp;&amp; typeof saved.positions === &#x27;object&#x27; ? saved.positions : {},
          runs: saved.runs &amp;&amp; typeof saved.runs === &#x27;object&#x27; ? saved.runs : {},
          runCounts: saved.runCounts &amp;&amp; typeof saved.runCounts === &#x27;object&#x27; ? saved.runCounts : {},
          questionStats: saved.questionStats &amp;&amp; typeof saved.questionStats === &#x27;object&#x27; ? saved.questionStats : {},
          bestScores: saved.bestScores &amp;&amp; typeof saved.bestScores === &#x27;object&#x27; ? saved.bestScores : {},
          timerStart: null
        });
        normalized.mistakes = Number.isFinite(saved.mistakes) ? saved.mistakes : 0;
        return normalized;
      }

      function readPersisted(key) {
        let raw = null;
        try { raw = localStorage.getItem(key); } catch (_) {}
        if (!raw &amp;&amp; window.name.startsWith(`${key}:`)) raw = window.name.slice(key.length + 1);
        return raw;
      }

      function loadSaveBank() {
        try {
          const savedBank = JSON.parse(readPersisted(SAVES_KEY));
          if (savedBank &amp;&amp; Array.isArray(savedBank.slots)) {
            const bank = freshSaveBank();
            bank.slots = bank.slots.map((_, index) =&gt; {
              const slot = savedBank.slots[index];
              if (!slot || !slot.state) return null;
              return { state: normalizeState(slot.state), updatedAt: slot.updatedAt || new Date().toISOString() };
            });
            return bank;
          }
        } catch (_) {}

        return freshSaveBank();
      }

      let saveBank = loadSaveBank();
      let state = freshState();
      let activeSlot = null;
      let answered = false;
      let menuMode = &#x27;home&#x27;;
      let pendingSlotAction = null;

      function persistSaveBank() {
        const serialized = JSON.stringify(saveBank);
        try { localStorage.setItem(SAVES_KEY, serialized); } catch (_) {}
        try { window.name = `${SAVES_KEY}:${serialized}`; } catch (_) {}
      }

      function saveState() {
        if (activeSlot === null) return;
        saveBank.slots[activeSlot] = { state: normalizeState(state), updatedAt: new Date().toISOString() };
        persistSaveBank();
      }

      function scoreFor(candidate) {
        return Object.values(candidate.correct || {}).filter(Boolean).length;
      }

      function score() {
        return scoreFor(state);
      }

      function rankFor(candidate) {
        const n = scoreFor(candidate);
        if ((candidate.completed || []).length === levels.length) return &#x27;Cartographe&#x27;;
        if (n &gt;= 48) return &#x27;Naturaliste&#x27;;
        if (n &gt;= 32) return &#x27;Fonctoriste&#x27;;
        if (n &gt;= 16) return &#x27;Navigateur&#x27;;
        return &#x27;Novice&#x27;;
      }

      function rank() {
        return rankFor(state);
      }

      function keyFor(levelIndex, questionIndex) { return `${levelIndex}-${questionIndex}`; }

      function totalBestScore(candidate = state) {
        return Object.values(candidate.bestScores || {}).reduce((sum, value) =&gt; sum + (Number(value) || 0), 0);
      }

      function islandScore(levelIndex) {
        return Object.entries(state.questionStats).reduce((sum, [key, value]) =&gt; key.startsWith(`${levelIndex}-`) ? sum + (Number(value.score) || 0) : sum, 0);
      }

      function ensureRun(levelIndex, force = false) {
        if (state.runs[levelIndex] &amp;&amp; !force) return state.runs[levelIndex];
        const count = (state.runCounts[levelIndex] || 0) + (force ? 1 : 0);
        state.runCounts[levelIndex] = count;
        const rng = seededRandom(`${state.gameSeed}:island:${levelIndex}:run:${count}`);
        const pool = questionPool(levelIndex, `${state.gameSeed}:${count}`);
        const patterns = [[2, 2, 1, 1, 1], [2, 2, 2, 1, 1], [2, 2, 2, 2, 1]];
        const pattern = patterns[QUESTION_COUNTS[levelIndex] - 7];
        const selected = pattern.flatMap((count, difficultyIndex) =&gt; shuffled(pool.filter(item =&gt; item.difficulty === difficultyIndex + 1), rng).slice(0, count));
        state.runs[levelIndex] = selected.map(item =&gt; prepareQuestion(item, rng, 4));
        return state.runs[levelIndex];
      }

      function formatUpdated(value) {
        try {
          return new Date(value).toLocaleString(&#x27;fr-FR&#x27;, { dateStyle: &#x27;short&#x27;, timeStyle: &#x27;short&#x27; });
        } catch (_) { return &#x27;date inconnue&#x27;; }
      }

      function slotDescription(slot) {
        if (!slot) return &#x27;Emplacement libre&#x27;;
        const savedState = normalizeState(slot.state);
        const shards = scoreFor(savedState);
        return `${savedState.completed.length}/${levels.length} îles · ${shards} réponses · ${savedState.mistakes} erreur${savedState.mistakes &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;} · ${totalBestScore(savedState).toLocaleString(&#x27;fr-FR&#x27;)} pts · ${formatUpdated(slot.updatedAt)}`;
      }

      function renderMenu() {
        const screen = root.querySelector(&#x27;#cat-menu-screen&#x27;);
        const gameScreen = root.querySelector(&#x27;#cat-game-screen&#x27;);
        gameScreen.hidden = true;
        screen.hidden = false;
        const occupiedCount = saveBank.slots.filter(Boolean).length;

        if (menuMode === &#x27;home&#x27;) {
          screen.innerHTML = `&lt;div class=&quot;card menu-hero&quot;&gt;
            &lt;span class=&quot;eyebrow&quot;&gt;Expédition mathématique · 8 territoires&lt;/span&gt;
            &lt;div class=&quot;menu-mark&quot; aria-hidden=&quot;true&quot;&gt;𝒞&lt;/div&gt;
            &lt;div class=&quot;menu-copy&quot;&gt;
              &lt;h1 class=&quot;display-title&quot;&gt;L’Archipel&lt;br&gt;des Flèches&lt;/h1&gt;
              &lt;span class=&quot;menu-lead&quot;&gt;Trace ta route dans un monde où les objets, les transformations et les idées sont reliés par des flèches.&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;menu-actions&quot;&gt;
              &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;cat-menu-new&quot;&gt;Commencer l’expédition&lt;/button&gt;
              &lt;button type=&quot;button&quot; class=&quot;btn&quot; id=&quot;cat-menu-continue&quot; ${occupiedCount ? &#x27;&#x27; : &#x27;disabled&#x27;}&gt;Reprendre un voyage&lt;/button&gt;
            &lt;/div&gt;
            &lt;div class=&quot;menu-meta text-small&quot;&gt;
              &lt;span&gt;64 missions progressives&lt;/span&gt;&lt;span class=&quot;meta-divider&quot; aria-hidden=&quot;true&quot;&gt;◆&lt;/span&gt;
              &lt;span&gt;10 journaux de voyage&lt;/span&gt;&lt;span class=&quot;meta-divider&quot; aria-hidden=&quot;true&quot;&gt;◆&lt;/span&gt;
              &lt;span&gt;${occupiedCount} sauvegarde${occupiedCount === 1 ? &#x27;&#x27; : &#x27;s&#x27;} active${occupiedCount === 1 ? &#x27;&#x27; : &#x27;s&#x27;}&lt;/span&gt;
            &lt;/div&gt;
          &lt;/div&gt;`;
          screen.querySelector(&#x27;#cat-menu-new&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { menuMode = &#x27;new&#x27;; pendingSlotAction = null; renderMenu(); });
          screen.querySelector(&#x27;#cat-menu-continue&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { menuMode = &#x27;continue&#x27;; pendingSlotAction = null; renderMenu(); });
          return;
        }

        const isNewGame = menuMode === &#x27;new&#x27;;
        const slotsMarkup = saveBank.slots.map((slot, index) =&gt; {
          const slotNumber = index + 1;
          const disabled = !isNewGame &amp;&amp; !slot;
          return `&lt;div class=&quot;slot-row&quot;&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-block slot-btn&quot; data-slot-choice=&quot;${index}&quot; ${disabled ? &#x27;disabled&#x27; : &#x27;&#x27;} aria-label=&quot;${isNewGame ? &#x27;Nouvelle partie dans&#x27; : &#x27;Continuer&#x27;} la sauvegarde ${slotNumber}, ${slotDescription(slot)}&quot;&gt;
              &lt;span class=&quot;slot-number&quot; aria-hidden=&quot;true&quot;&gt;${String(slotNumber).padStart(2, &#x27;0&#x27;)}&lt;/span&gt;
              &lt;span class=&quot;slot-copy&quot;&gt;&lt;strong&gt;Journal ${slotNumber}&lt;/strong&gt;&lt;span class=&quot;text-small ${slot ? &#x27;&#x27; : &#x27;slot-empty&#x27;}&quot;&gt;${slotDescription(slot)}&lt;/span&gt;&lt;/span&gt;
            &lt;/button&gt;
            ${slot ? `&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-slot-delete=&quot;${index}&quot; aria-label=&quot;Effacer la sauvegarde ${slotNumber}&quot;&gt;Effacer&lt;/button&gt;` : &#x27;&#x27;}
          &lt;/div&gt;`;
        }).join(&#x27;&#x27;);

        let warningMarkup = &#x27;&#x27;;
        if (pendingSlotAction) {
          const slotNumber = pendingSlotAction.index + 1;
          const overwrite = pendingSlotAction.type === &#x27;overwrite&#x27;;
          warningMarkup = `&lt;section class=&quot;card slot-warning&quot; role=&quot;dialog&quot; aria-labelledby=&quot;cat-slot-warning-title&quot;&gt;
            &lt;strong id=&quot;cat-slot-warning-title&quot;&gt;${overwrite ? `Écraser la sauvegarde ${slotNumber} ?` : `Effacer la sauvegarde ${slotNumber} ?`}&lt;/strong&gt;
            &lt;span class=&quot;text-destructive&quot;&gt;${overwrite ? &#x27;La progression de cet emplacement sera remplacée par une nouvelle partie.&#x27; : &#x27;Toute la progression de cet emplacement sera définitivement supprimée.&#x27;}&lt;/span&gt;
            &lt;div class=&quot;menu-actions&quot;&gt;
              &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;cat-slot-confirm&quot;&gt;${overwrite ? &#x27;Écraser et démarrer&#x27; : &#x27;Effacer définitivement&#x27;}&lt;/button&gt;
              &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;cat-slot-cancel&quot;&gt;Annuler&lt;/button&gt;
            &lt;/div&gt;
          &lt;/section&gt;`;
        }

        screen.innerHTML = `&lt;div class=&quot;slot-layout&quot;&gt;&lt;div class=&quot;slot-head&quot;&gt;
          &lt;div class=&quot;menu-copy&quot;&gt;
            &lt;span class=&quot;eyebrow&quot;&gt;Journaux de voyage&lt;/span&gt;
            &lt;h2&gt;${isNewGame ? &#x27;Choisir un nouveau départ&#x27; : &#x27;Reprendre une expédition&#x27;}&lt;/h2&gt;
            &lt;span&gt;${isNewGame ? &#x27;Choisis un emplacement. Un emplacement occupé demandera confirmation avant d’être écrasé.&#x27; : &#x27;Choisis une sauvegarde existante. Les emplacements libres ne peuvent pas être chargés.&#x27;}&lt;/span&gt;
          &lt;/div&gt;
          &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;cat-menu-home&quot;&gt;← Menu principal&lt;/button&gt;
        &lt;/div&gt;
        ${warningMarkup}
        &lt;div class=&quot;slot-grid&quot; aria-label=&quot;10 emplacements de sauvegarde&quot;&gt;${slotsMarkup}&lt;/div&gt;&lt;/div&gt;`;

        screen.querySelector(&#x27;#cat-menu-home&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { menuMode = &#x27;home&#x27;; pendingSlotAction = null; renderMenu(); });
        screen.querySelectorAll(&#x27;[data-slot-choice]&#x27;).forEach(button =&gt; {
          button.addEventListener(&#x27;click&#x27;, () =&gt; {
            const index = Number(button.dataset.slotChoice);
            if (isNewGame) {
              if (saveBank.slots[index]) {
                pendingSlotAction = { type: &#x27;overwrite&#x27;, index };
                renderMenu();
              } else startNewGame(index);
            } else if (saveBank.slots[index]) continueGame(index);
          });
        });
        screen.querySelectorAll(&#x27;[data-slot-delete]&#x27;).forEach(button =&gt; {
          button.addEventListener(&#x27;click&#x27;, () =&gt; {
            pendingSlotAction = { type: &#x27;delete&#x27;, index: Number(button.dataset.slotDelete) };
            renderMenu();
          });
        });
        const confirmButton = screen.querySelector(&#x27;#cat-slot-confirm&#x27;);
        if (confirmButton) {
          confirmButton.addEventListener(&#x27;click&#x27;, () =&gt; {
            const action = pendingSlotAction;
            if (!action) return;
            if (action.type === &#x27;overwrite&#x27;) startNewGame(action.index);
            else {
              saveBank.slots[action.index] = null;
              pendingSlotAction = null;
              persistSaveBank();
              renderMenu();
            }
          });
          screen.querySelector(&#x27;#cat-slot-cancel&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { pendingSlotAction = null; renderMenu(); });
          confirmButton.focus();
        }
      }

      function showGame(slotIndex, savedState) {
        activeSlot = slotIndex;
        state = normalizeState(savedState);
        state.timerStart = null;
        answered = false;
        pendingSlotAction = null;
        root.querySelector(&#x27;#cat-menu-screen&#x27;).hidden = true;
        root.querySelector(&#x27;#cat-game-screen&#x27;).hidden = false;
        root.querySelector(&#x27;#cat-active-slot&#x27;).textContent = `Sauvegarde ${slotIndex + 1}`;
        closeResetPanel();
        renderAll();
      }

      function startNewGame(slotIndex) {
        state = freshState();
        activeSlot = slotIndex;
        saveState();
        showGame(slotIndex, state);
      }

      function continueGame(slotIndex) {
        const slot = saveBank.slots[slotIndex];
        if (slot) showGame(slotIndex, slot.state);
      }

      function returnToMenu() {
        state.timerStart = null;
        saveState();
        closeResetPanel();
        activeSlot = null;
        state = freshState();
        answered = false;
        menuMode = &#x27;home&#x27;;
        pendingSlotAction = null;
        renderMenu();
      }

      function renderAll() {
        renderStats();
        renderRoadmap();
        renderPlay();
        renderNotebook();
      }

      let mathConversionQueue = Promise.resolve();

      function typesetMath(container) {
        if (!container || !window.MathJax || typeof window.MathJax.tex2svgPromise !== &#x27;function&#x27;) return;
        container.querySelectorAll(&#x27;[data-math-tex]:not([data-math-pending])&#x27;).forEach(target =&gt; {
          const tex = target.getAttribute(&#x27;data-math-tex&#x27;) || &#x27;&#x27;;
          target.setAttribute(&#x27;data-math-pending&#x27;, &#x27;true&#x27;);
          mathConversionQueue = mathConversionQueue
            .catch(() =&gt; {})
            .then(() =&gt; window.MathJax.tex2svgPromise(tex, { display: false }))
            .then(output =&gt; new Promise(resolve =&gt; {
              if (!target.isConnected) { resolve(); return; }
              const fallback = target.querySelector(&#x27;.math-fallback&#x27;);
              output.setAttribute(&#x27;aria-hidden&#x27;, &#x27;true&#x27;);
              output.style.visibility = &#x27;hidden&#x27;;
              target.append(output);
              requestAnimationFrame(() =&gt; {
                const svg = output.querySelector(&#x27;svg&#x27;);
                const bounds = svg ? svg.getBoundingClientRect() : { width: 0, height: 0 };
                if (bounds.width &gt; 0 &amp;&amp; bounds.height &gt; 0) {
                  if (fallback) fallback.hidden = true;
                  output.style.visibility = &#x27;&#x27;;
                  target.removeAttribute(&#x27;data-math-tex&#x27;);
                  target.removeAttribute(&#x27;data-math-fallback&#x27;);
                } else {
                  output.remove();
                }
                target.removeAttribute(&#x27;data-math-pending&#x27;);
                resolve();
              });
            }))
            .catch(() =&gt; {
              if (!target.isConnected) return;
              const output = target.querySelector(&#x27;mjx-container&#x27;);
              if (output) output.remove();
              target.removeAttribute(&#x27;data-math-pending&#x27;);
            });
        });
      }

      function clearMath(container) {
        if (!container) return;
      }

      function renderStats() {
        root.querySelector(&#x27;#cat-islands&#x27;).textContent = `${state.completed.length} / ${levels.length}`;
        root.querySelector(&#x27;#cat-stars&#x27;).textContent = String(score());
        root.querySelector(&#x27;#cat-mistakes&#x27;).textContent = String(state.mistakes);
        root.querySelector(&#x27;#cat-score&#x27;).textContent = totalBestScore().toLocaleString(&#x27;fr-FR&#x27;);
      }

      function renderRoadmap() {
        const map = root.querySelector(&#x27;#cat-roadmap&#x27;);
        map.innerHTML = levels.map((level, index) =&gt; {
          const locked = index &gt;= state.unlocked;
          const done = state.completed.includes(index);
          const current = index === state.currentLevel;
          return `&lt;div class=&quot;island${locked ? &#x27; island-lock&#x27; : &#x27;&#x27;}&quot; ${current ? &#x27;aria-current=&quot;step&quot;&#x27; : &#x27;&#x27;}&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn${current ? &#x27; is-selected&#x27; : &#x27;&#x27;}&quot; data-level=&quot;${index}&quot; ${locked ? &#x27;disabled&#x27; : &#x27;&#x27;} aria-label=&quot;${locked ? &#x27;Île verrouillée : &#x27; : &#x27;&#x27;}${level.name}&quot;&gt;&lt;span aria-hidden=&quot;true&quot;&gt;${done ? &#x27;✓&#x27; : level.icon}&lt;/span&gt;&lt;span class=&quot;island-index&quot; aria-hidden=&quot;true&quot;&gt;${index + 1}&lt;/span&gt;&lt;/button&gt;
            &lt;span class=&quot;island-label text-small&quot;&gt;${level.short}&lt;/span&gt;
          &lt;/div&gt;`;
        }).join(&#x27;&#x27;);
        map.querySelectorAll(&#x27;[data-level]&#x27;).forEach(button =&gt; {
          button.addEventListener(&#x27;click&#x27;, () =&gt; {
            const next = Number(button.dataset.level);
            if (next &lt; state.unlocked) {
              if (state.currentLevel &lt; levels.length) state.positions[state.currentLevel] = state.currentQuestion;
              state.currentLevel = next;
              ensureRun(next);
              state.currentQuestion = Math.min(Number(state.positions[next]) || 0, state.runs[next].length - 1);
              state.viewMode = state.courseCompleted.includes(next) ? &#x27;quiz&#x27; : &#x27;course&#x27;;
              state.coursePage = 0;
              state.returnToQuiz = false;
              state.timerStart = null;
              answered = false;
              markSeen(next);
              saveState();
              renderAll();
            }
          });
        });
      }

      function markSeen(levelIndex) {
        if (!state.seen.includes(levelIndex)) state.seen.push(levelIndex);
      }

      function renderPlay() {
        const play = root.querySelector(&#x27;#cat-play&#x27;);
        clearMath(play);
        if (state.completed.length === levels.length &amp;&amp; state.currentLevel &gt;= levels.length) {
          play.innerHTML = `&lt;div class=&quot;ending&quot;&gt;
            &lt;span class=&quot;eyebrow&quot;&gt;Expédition accomplie&lt;/span&gt;
            &lt;div class=&quot;ending-mark&quot; aria-hidden=&quot;true&quot;&gt;𝒞&lt;/div&gt;
            &lt;h2&gt;Archipel cartographié !&lt;/h2&gt;
            &lt;p class=&quot;ending-copy&quot;&gt;Tu as relié objets, morphismes, foncteurs et adjonctions. Meilleur total : &lt;strong&gt;${totalBestScore().toLocaleString(&#x27;fr-FR&#x27;)} points&lt;/strong&gt;, avec &lt;strong&gt;${state.mistakes} erreur${state.mistakes &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;}&lt;/strong&gt; enregistrée${state.mistakes &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;}.&lt;/p&gt;
            &lt;span class=&quot;viz-badge&quot;&gt;${rank()} · ${score()} réponses maîtrisées&lt;/span&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;cat-revisit&quot;&gt;Revisiter la carte&lt;/button&gt;
          &lt;/div&gt;`;
          play.querySelector(&#x27;#cat-revisit&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { state.currentLevel = 0; state.currentQuestion = 0; state.viewMode = &#x27;course&#x27;; state.coursePage = 0; saveState(); renderAll(); });
          typesetMath(play);
          return;
        }

        const levelIndex = Math.min(state.currentLevel, levels.length - 1);
        const level = levels[levelIndex];
        ensureRun(levelIndex);
        if (state.viewMode === &#x27;course&#x27;) {
          renderCourse(play, levelIndex);
          return;
        }
        const run = state.runs[levelIndex];
        const questionIndex = Math.min(state.currentQuestion, run.length - 1);
        state.currentQuestion = questionIndex;
        state.positions[levelIndex] = questionIndex;
        const item = run[questionIndex];
        const dots = run.map((_, i) =&gt; `&lt;span class=&quot;mission-dot ${state.correct[keyFor(levelIndex, i)] ? &#x27;is-done&#x27; : &#x27;&#x27;} ${i === questionIndex ? &#x27;is-current&#x27; : &#x27;&#x27;}&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;`).join(&#x27;&#x27;);
        const savedCorrect = Boolean(state.correct[keyFor(levelIndex, questionIndex)]);
        answered = savedCorrect;
        if (!savedCorrect &amp;&amp; !state.timerStart) state.timerStart = Date.now();
        const stat = state.questionStats[keyFor(levelIndex, questionIndex)] || {};
        const difficulty = Array.from({ length: 5 }, (_, i) =&gt; `&lt;span class=&quot;difficulty-mark ${i &lt; item.difficulty ? &#x27;is-on&#x27; : &#x27;&#x27;}&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;`).join(&#x27;&#x27;);

        play.innerHTML = `
          &lt;div class=&quot;mission-head&quot;&gt;
            &lt;div class=&quot;mission-title&quot;&gt;
              &lt;span class=&quot;eyebrow&quot;&gt;Territoire ${String(levelIndex + 1).padStart(2, &#x27;0&#x27;)} · Mission ${String(questionIndex + 1).padStart(2, &#x27;0&#x27;)}&lt;/span&gt;
              &lt;h2&gt;${level.icon} ${level.name}&lt;/h2&gt;
            &lt;/div&gt;
            &lt;div class=&quot;mission-progress&quot;&gt;
              &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;cat-course-review&quot;&gt;Revoir le cours&lt;/button&gt;
              &lt;span class=&quot;text-small text-muted&quot;&gt;${questionIndex + 1} / ${run.length}&lt;/span&gt;
              &lt;div class=&quot;mission-dots&quot; aria-label=&quot;Progression dans l’île&quot;&gt;${dots}&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;concept-strip&quot;&gt;
            &lt;span class=&quot;concept-icon&quot; aria-hidden=&quot;true&quot;&gt;∴&lt;/span&gt;
            &lt;div class=&quot;concept-copy&quot;&gt;&lt;strong&gt;${level.concept}&lt;/strong&gt;&lt;span&gt;${mathText(level.intro)}&lt;/span&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;diagram quiz-diagram&quot;&gt;${diagramMarkup(level.diagram)}&lt;/div&gt;
          &lt;div class=&quot;question-zone&quot;&gt;
            &lt;div class=&quot;difficulty&quot;&gt;&lt;span class=&quot;question-label&quot;&gt;Question d’exploration&lt;/span&gt;&lt;span class=&quot;difficulty-marks&quot; aria-label=&quot;Difficulté ${item.difficulty} sur 5&quot;&gt;${difficulty}&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;question&quot;&gt;${mathText(item.q)}&lt;/div&gt;
            &lt;div class=&quot;answers&quot;&gt;${item.answers.map((answer, i) =&gt; `&lt;button type=&quot;button&quot; class=&quot;btn btn-block&quot; data-answer=&quot;${i}&quot; ${savedCorrect ? &#x27;disabled&#x27; : &#x27;&#x27;}&gt;&lt;span class=&quot;choice-key&quot; aria-hidden=&quot;true&quot;&gt;${String.fromCharCode(65 + i)}&lt;/span&gt;&lt;span&gt;${mathText(answer)}&lt;/span&gt;&lt;/button&gt;`).join(&#x27;&#x27;)}&lt;/div&gt;
            &lt;div class=&quot;feedback ${savedCorrect ? &#x27;is-success&#x27; : &#x27;&#x27;}&quot; id=&quot;cat-feedback&quot;&gt;${savedCorrect ? feedbackMarkup(item.why, &#x27;success&#x27;) : feedbackMarkup(&#x27;Choisis une réponse pour tester ton intuition.&#x27;)}&lt;/div&gt;
            ${savedCorrect ? `&lt;div class=&quot;score-note&quot;&gt;&lt;span&gt;Cette réponse : &lt;strong&gt;${(stat.score || 0).toLocaleString(&#x27;fr-FR&#x27;)} points&lt;/strong&gt;&lt;/span&gt;&lt;span&gt;${stat.firstTry ? &#x27;Juste du premier coup&#x27; : `${stat.attempts || 1} tentatives`}&lt;/span&gt;&lt;span&gt;${Math.round((stat.thinkingMs || 0) / 1000)} s de réflexion&lt;/span&gt;&lt;/div&gt;` : &#x27;&#x27;}
          &lt;/div&gt;
          &lt;div class=&quot;action-row&quot;&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;cat-prev&quot; ${questionIndex === 0 ? &#x27;disabled&#x27; : &#x27;&#x27;}&gt;← Mission précédente&lt;/button&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;cat-next&quot; ${savedCorrect ? &#x27;&#x27; : &#x27;disabled&#x27;}&gt;${questionIndex === run.length - 1 ? &#x27;Terminer l’île&#x27; : &#x27;Mission suivante&#x27;} →&lt;/button&gt;
          &lt;/div&gt;`;

        markSeen(levelIndex);
        saveState();
        play.querySelector(&#x27;#cat-course-review&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
          if (!savedCorrect) accumulateThinking(keyFor(levelIndex, questionIndex));
          state.viewMode = &#x27;course&#x27;;
          state.coursePage = 0;
          state.returnToQuiz = true;
          saveState();
          renderPlay();
        });
        play.querySelectorAll(&#x27;[data-answer]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; chooseAnswer(Number(button.dataset.answer))));
        play.querySelector(&#x27;#cat-prev&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
          if (state.currentQuestion &gt; 0) {
            if (!savedCorrect) accumulateThinking(keyFor(levelIndex, questionIndex));
            state.currentQuestion -= 1;
            answered = false;
            saveState();
            renderPlay();
          }
        });
        play.querySelector(&#x27;#cat-next&#x27;).addEventListener(&#x27;click&#x27;, nextMission);
        typesetMath(play);
      }

      function renderCourse(play, levelIndex) {
        const level = levels[levelIndex];
        const pageIndex = Math.max(0, Math.min(state.coursePage, level.course.length - 1));
        state.coursePage = pageIndex;
        const page = level.course[pageIndex];
        const progress = level.course.map((_, i) =&gt; `&lt;span class=&quot;course-step ${i &lt;= pageIndex ? &#x27;is-done&#x27; : &#x27;&#x27;}&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;`).join(&#x27;&#x27;);
        play.innerHTML = `&lt;div class=&quot;course-shell&quot;&gt;
          &lt;div class=&quot;mission-head&quot;&gt;
            &lt;div class=&quot;mission-title&quot;&gt;
              &lt;span class=&quot;eyebrow&quot;&gt;Territoire ${String(levelIndex + 1).padStart(2, &#x27;0&#x27;)} · Cours ${pageIndex + 1}/${level.course.length}&lt;/span&gt;
              &lt;h2&gt;${level.icon} ${level.name}&lt;/h2&gt;
              &lt;span class=&quot;mission-kicker&quot;&gt;${mathText(level.intro)}&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;mission-progress&quot;&gt;
              ${state.returnToQuiz ? &#x27;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;cat-return-quiz&quot;&gt;Retour à l’épreuve&lt;/button&gt;&#x27; : &#x27;&#x27;}
              &lt;div class=&quot;course-progress&quot; aria-label=&quot;Progression du cours&quot;&gt;${progress}&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;diagram&quot;&gt;${diagramMarkup(level.diagram)}&lt;/div&gt;
          &lt;article class=&quot;course-copy&quot;&gt;
            &lt;span class=&quot;eyebrow&quot;&gt;Leçon ${String(pageIndex + 1).padStart(2, &#x27;0&#x27;)}&lt;/span&gt;
            &lt;h3&gt;${page.title}&lt;/h3&gt;
            &lt;p&gt;${mathText(page.body)}&lt;/p&gt;
            &lt;ul class=&quot;course-points&quot;&gt;${page.points.map(point =&gt; `&lt;li&gt;${mathText(point)}&lt;/li&gt;`).join(&#x27;&#x27;)}&lt;/ul&gt;
            &lt;div class=&quot;course-example&quot;&gt;&lt;strong&gt;Exemple&lt;/strong&gt;&lt;span&gt;${mathText(page.example)}&lt;/span&gt;&lt;/div&gt;
          &lt;/article&gt;
          &lt;div class=&quot;course-actions&quot;&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;cat-course-prev&quot; ${pageIndex === 0 ? &#x27;disabled&#x27; : &#x27;&#x27;}&gt;← Partie précédente&lt;/button&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;cat-course-next&quot;&gt;${pageIndex === level.course.length - 1 ? (state.returnToQuiz ? &#x27;Retour à l’épreuve&#x27; : &#x27;Commencer l’épreuve&#x27;) : &#x27;Partie suivante&#x27;} →&lt;/button&gt;
          &lt;/div&gt;
        &lt;/div&gt;`;
        markSeen(levelIndex);
        saveState();
        const returnButton = play.querySelector(&#x27;#cat-return-quiz&#x27;);
        if (returnButton) returnButton.addEventListener(&#x27;click&#x27;, beginQuiz);
        play.querySelector(&#x27;#cat-course-prev&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { state.coursePage -= 1; saveState(); renderPlay(); });
        play.querySelector(&#x27;#cat-course-next&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
          if (pageIndex &lt; level.course.length - 1) { state.coursePage += 1; saveState(); renderPlay(); }
          else beginQuiz();
        });
        typesetMath(play);
      }

      function beginQuiz() {
        if (!state.courseCompleted.includes(state.currentLevel)) state.courseCompleted.push(state.currentLevel);
        state.viewMode = &#x27;quiz&#x27;;
        state.returnToQuiz = false;
        state.timerStart = null;
        ensureRun(state.currentLevel);
        saveState();
        renderPlay();
      }

      function accumulateThinking(key) {
        if (!state.timerStart) return;
        const elapsed = Math.max(0, Math.min(Date.now() - state.timerStart, 300000));
        const stat = state.questionStats[key] || { attempts: state.attempts[key] || 0, thinkingMs: 0 };
        stat.thinkingMs = (stat.thinkingMs || 0) + elapsed;
        state.questionStats[key] = stat;
        state.timerStart = null;
      }

      function chooseAnswer(choice) {
        if (answered) return;
        const item = ensureRun(state.currentLevel)[state.currentQuestion];
        const key = keyFor(state.currentLevel, state.currentQuestion);
        state.attempts[key] = (state.attempts[key] || 0) + 1;
        accumulateThinking(key);
        const stat = state.questionStats[key] || { thinkingMs: 0 };
        stat.attempts = state.attempts[key];
        state.questionStats[key] = stat;
        const feedback = root.querySelector(&#x27;#cat-feedback&#x27;);
        const live = root.querySelector(&#x27;#cat-live&#x27;);
        if (choice === item.ok) {
          state.correct[key] = true;
          answered = true;
          stat.firstTry = stat.attempts === 1;
          const speedBonus = Math.max(0, 600 - Math.floor((stat.thinkingMs || 0) / 1000) * 10);
          stat.score = (stat.firstTry ? 1000 : 550) + speedBonus;
          feedback.className = &#x27;feedback is-success&#x27;;
          feedback.innerHTML = feedbackMarkup(item.why, &#x27;success&#x27;);
          live.textContent = &#x27;Bonne réponse. Un éclat de savoir gagné.&#x27;;
          root.querySelectorAll(&#x27;[data-answer]&#x27;).forEach((button, i) =&gt; {
            button.disabled = true;
            if (i === choice) button.classList.add(&#x27;is-selected&#x27;);
          });
          root.querySelector(&#x27;#cat-next&#x27;).disabled = false;
          saveState();
          renderAll();
        } else {
          state.mistakes += 1;
          feedback.className = &#x27;feedback is-error&#x27;;
          feedback.innerHTML = feedbackMarkup(&#x27;Pas tout à fait. Relis les types et le sens des flèches, puis réessaie.&#x27;, &#x27;error&#x27;);
          live.textContent = &#x27;Réponse incorrecte. Tu peux réessayer.&#x27;;
          state.timerStart = Date.now();
          saveState();
          renderStats();
        }
      }

      function nextMission() {
        const run = ensureRun(state.currentLevel);
        if (!state.correct[keyFor(state.currentLevel, state.currentQuestion)]) return;
        if (state.currentQuestion &lt; run.length - 1) {
          state.currentQuestion += 1;
          state.positions[state.currentLevel] = state.currentQuestion;
          state.timerStart = null;
          answered = false;
          saveState();
          renderAll();
          return;
        }
        if (!state.completed.includes(state.currentLevel)) state.completed.push(state.currentLevel);
        const finished = state.currentLevel;
        state.positions[finished] = run.length - 1;
        state.bestScores[finished] = Math.max(Number(state.bestScores[finished]) || 0, islandScore(finished));
        state.unlocked = Math.min(levels.length, Math.max(state.unlocked, finished + 2));
        if (finished === levels.length - 1) {
          state.currentLevel = levels.length;
          state.currentQuestion = 0;
        } else {
          state.currentLevel = finished + 1;
          state.currentQuestion = Number(state.positions[state.currentLevel]) || 0;
          state.viewMode = state.courseCompleted.includes(state.currentLevel) ? &#x27;quiz&#x27; : &#x27;course&#x27;;
          state.coursePage = 0;
        }
        state.timerStart = null;
        state.returnToQuiz = false;
        answered = false;
        saveState();
        renderAll();
        root.querySelector(&#x27;#cat-live&#x27;).textContent = finished === levels.length - 1 ? &#x27;Expédition terminée.&#x27; : &#x27;Nouvelle île débloquée.&#x27;;
      }

      function renderNotebook() {
        const area = root.querySelector(&#x27;#cat-discoveries&#x27;);
        const discoveries = levels.filter((_, index) =&gt; state.seen.includes(index));
        area.innerHTML = discoveries.length
          ? discoveries.map((level, index) =&gt; `&lt;span class=&quot;viz-badge&quot;&gt;${level.icon} ${level.concept}${state.completed.includes(levels.indexOf(level)) ? &#x27; · maîtrisé&#x27; : &#x27; · en cours&#x27;}&lt;/span&gt;`).join(&#x27;&#x27;)
          : &#x27;&lt;span class=&quot;text-muted&quot;&gt;Ton premier concept apparaîtra ici dès que tu accosteras.&lt;/span&gt;&#x27;;
      }

      const resetButton = root.querySelector(&#x27;#cat-reset&#x27;);
      const resetPanel = root.querySelector(&#x27;#cat-reset-panel&#x27;);

      function closeResetPanel(returnFocus = false) {
        resetPanel.hidden = true;
        resetButton.setAttribute(&#x27;aria-expanded&#x27;, &#x27;false&#x27;);
        if (returnFocus) resetButton.focus();
      }

      function openResetPanel() {
        const levelIndex = Math.min(state.currentLevel, levels.length - 1);
        root.querySelector(&#x27;#cat-reset-island-detail&#x27;).textContent = `Île actuelle (${levels[levelIndex].name}) : renouvelle ses ${QUESTION_COUNTS[levelIndex]} questions et efface son score en cours. Le meilleur score déjà obtenu reste conservé.`;
        resetPanel.hidden = false;
        resetButton.setAttribute(&#x27;aria-expanded&#x27;, &#x27;true&#x27;);
        root.querySelector(&#x27;#cat-reset-island&#x27;).focus();
      }

      function restartCurrentIsland() {
        const levelIndex = Math.min(state.currentLevel, levels.length - 1);
        const previousRun = ensureRun(levelIndex);
        previousRun.forEach((_, questionIndex) =&gt; {
          const key = keyFor(levelIndex, questionIndex);
          delete state.correct[key];
          delete state.attempts[key];
          delete state.questionStats[key];
        });
        state.completed = state.completed.filter(index =&gt; index !== levelIndex);
        state.currentLevel = levelIndex;
        state.currentQuestion = 0;
        state.positions[levelIndex] = 0;
        state.viewMode = &#x27;course&#x27;;
        state.coursePage = 0;
        state.returnToQuiz = false;
        state.timerStart = null;
        ensureRun(levelIndex, true);
        answered = false;
        markSeen(levelIndex);
        closeResetPanel();
        saveState();
        renderAll();
        root.querySelector(&#x27;#cat-live&#x27;).textContent = `${levels[levelIndex].name} recommencée avec une nouvelle série de questions.`;
      }

      function restartEntireGame() {
        state = freshState();
        answered = false;
        closeResetPanel();
        saveState();
        renderAll();
        root.querySelector(&#x27;#cat-live&#x27;).textContent = &#x27;Toute la progression a été effacée. Retour à la première île.&#x27;;
      }

      resetButton.addEventListener(&#x27;click&#x27;, () =&gt; {
        if (resetPanel.hidden) openResetPanel();
        else closeResetPanel(true);
      });
      root.querySelector(&#x27;#cat-reset-island&#x27;).addEventListener(&#x27;click&#x27;, restartCurrentIsland);
      root.querySelector(&#x27;#cat-reset-game&#x27;).addEventListener(&#x27;click&#x27;, restartEntireGame);
      root.querySelector(&#x27;#cat-reset-cancel&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; closeResetPanel(true));
      root.querySelector(&#x27;#cat-back-menu&#x27;).addEventListener(&#x27;click&#x27;, returnToMenu);
      root.addEventListener(&#x27;keydown&#x27;, event =&gt; {
        if (event.key === &#x27;Escape&#x27; &amp;&amp; !resetPanel.hidden) closeResetPanel(true);
      });

      persistSaveBank();
      renderMenu();
      window.addEventListener(&#x27;load&#x27;, () =&gt; typesetMath(root), { once: true });
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
